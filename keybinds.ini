# PSXRecomp Keyboard Keybinds (keyboard -> DualShock).
# Written by recomp-ui's launcher (psx_keybinds.c-compatible format);
# also read/regenerated by the game's own runtime. Edit values and
# restart, or rebind live in the launcher's Controls page.
# Use SDL key names, or "None" to leave an input unbound.

[player1]
up        = Up
down      = Down
left      = Left
right     = Right
triangle  = A
circle    = S
cross     = X
square    = Z
l1        = Q
l2        = E
r1        = W
r2        = R
l3        = T
r3        = Y
start     = Return
select    = Right Shift
ls_up     = Up
ls_down   = Down
ls_left   = Left
ls_right  = Right
rs_up     = None
rs_down   = None
rs_left   = None
rs_right  = None

[player2]
up        = None
down      = None
left      = None
right     = None
triangle  = None
circle    = None
cross     = None
square    = None
l1        = None
l2        = None
r1        = None
r2        = None
l3        = None
r3        = None
start     = None
select    = None
ls_up     = None
ls_down   = None
ls_left   = None
ls_right  = None
rs_up     = None
rs_down   = None
rs_left   = None
rs_right  = None

