# Controller Keybinds
# Edit values to customize. Restart the game to apply.
# Use SDL key names. Common: A B C ... Z, 0-9, F1-F12, Up Down Left Right,
# Return, Tab, Space, Left Shift, Right Shift, Left Ctrl, Right Ctrl,
# Backspace, Escape, Backslash. Use "None" to leave a button unbound.
#
# l2/r2/l3/r3 are only used by systems with a deeper button set than
# SNES (e.g. PSX L2/R2 shoulders, L3/R3 stick clicks); harmless if unused.
#
# Player 2 is unbound by default — fill in keys to enable a second
# keyboard player.

[player1]
a       = X
b       = Z
x       = S
y       = A
l       = C
r       = V
start   = Return
select  = Right Shift
up      = Up
down    = Down
left    = Left
right   = Right
l2      = Q
r2      = E
l3      = None
r3      = None

[player2]
a       = None
b       = None
x       = None
y       = None
l       = None
r       = None
start   = None
select  = None
up      = None
down    = None
left    = None
right   = None
l2      = None
r2      = None
l3      = None
r3      = None

